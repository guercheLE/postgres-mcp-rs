[package]
name = "postgresql-mcp"
default-run = "postgresql-mcp"
version = "0.1.0"
edition = "2024"
description = "PostgreSQL 18.4 catalog MCP server, generated by mcpify."
license = "MIT"
repository = "https://github.com/guercheLE/postgresql-mcp"
readme = "README.md"
authors = ["Luciano Evaristo Guerche (Gorše)"]
keywords = ["mcp", "postgres", "cli", "api"]
categories = ["command-line-utilities", "api-bindings"]
publish = true
exclude = [
    "/.github",
    "/.mcpify",
    "/docs",
    "/scripts",
    "/Dockerfile",
    "/docker-compose.yml",
    "/.dockerignore",
    "/.env.example",
    "/mcpify.yaml",
    "/dhat-heap.json",
    "/profile",
    "/.fastembed_cache",
]

[lib]
name = "postgres_mcp"
path = "src/lib.rs"

[[bin]]
name = "postgresql-mcp"
path = "src/main.rs"

[[bin]]
name = "postgresql-mcp-populate-embeddings"
path = "src/bin/populate_embeddings.rs"

[[bin]]
name = "postgresql-mcp-healthcheck"
path = "src/bin/healthcheck.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
rmcp = { version = "2", features = ["server", "transport-io", "transport-streamable-http-server"] }
axum = "0.8"
# PostgreSQL is not an HTTP API. Catalog operations and the injection-safe
# execute_sql fallback use the native PostgreSQL extended query protocol.
# Every caller-supplied value is bound separately from its SQL statement.
tokio-postgres = { version = "0.7", features = ["with-serde_json-1"] }
tokio-postgres-rustls = { version = "0.14", features = ["aws-lc-rs", "native-certs", "webpki-roots"] }
# Explicit rustls crypto provider: both the PostgreSQL TLS connector and
# opentelemetry-otlp's HTTP exporter require a process-wide provider.
rustls = { version = "0.23", default-features = false, features = ["aws_lc_rs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.32", features = ["bundled", "load_extension", "backup"] }
sqlite-vec = "0.1"
zstd = "0.13"
jsonschema = "0.46"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
tracing-opentelemetry = "0.33"
opentelemetry = "0.32"
opentelemetry_sdk = "0.32"
opentelemetry-otlp = "0.32"
# default-features disabled to select rustls-tls variants instead of the
# native-tls ones (default): native-tls pulls in openssl-sys, which needs
# system OpenSSL dev headers that the Docker builder image doesn't have.
fastembed = { version = "5", default-features = false, features = ["ort-download-binaries-rustls-tls", "hf-hub-rustls-tls", "image-models"] }
keyring = "4"
sha2 = "0.11"
aes-gcm = "0.10"
inquire = "0.7"
anyhow = "1"
thiserror = "2"
base64 = "0.22"
dhat = { version = "0.3", optional = true }

[features]
# Opt-in heap profiling via dhat-rs (scripts/profile-heap.sh) — a
# pure-library profiler with no external OS tool needed, so it works
# identically on every platform. Zero cost when the feature isn't enabled.
profiling = ["dep:dhat"]

[profile.dist]
inherits = "release"
lto = "thin"

[dev-dependencies]
tempfile = "3"
rand = "0.8"
tower = { version = "0.5", features = ["util"] }
rmcp = { version = "2", features = ["client"] }
