services:
  postgresql-mcp:
    build: .
    image: postgresql-mcp:latest
    command: ["start"]
    env_file:
      - .env
    volumes:
      - ~/.postgresql-mcp:/root/.postgresql-mcp
    stdin_open: true
    tty: true

  postgresql-mcp-http:
    build: .
    image: postgresql-mcp:latest
    command: ["http", "--host", "0.0.0.0", "--port", "3000"]
    env_file:
      - .env
    environment:
      POSTGRES_MCP_TRANSPORT: http
      POSTGRES_MCP_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ~/.postgresql-mcp:/root/.postgresql-mcp
