publication:
  license: MIT
  repository: https://github.com/guercheLE/postgresql-mcp
  readme: README.md
  authors:
    - Luciano Evaristo Guerche (Gorše)
  keywords:
    - mcp
    - postgres
    - cli
    - api
  categories:
    - command-line-utilities
    - api-bindings
  exclude:
    - /.github
    - /.mcpify
    - /docs
    - /scripts
    - /Dockerfile
    - /docker-compose.yml
    - /.dockerignore
    - /.env.example
    - /mcpify.yaml
default_headers:
  - name: User-Agent
    value: postgresql-mcp/0.1.0 (generated by mcpify)
package_size_limit_bytes: 10000000
